name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: elmikeev_test_task_db_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot" --health-interval=5s --health-timeout=5s --health-retries=15
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: elmikeev_test_task_db_test
      DB_USERNAME: root
      DB_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_mysql, mbstring, bcmath, zip
      - run: cp .env.example .env
      - run: composer install --no-interaction
      - run: php artisan key:generate
      - run: php artisan test --filter=ImportIdempotencyTest
